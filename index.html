<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ką valgyti?</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f7faf8;
            color: #26332d;
        }

        header {
            background-color: #ffffff;
            border-bottom: 1px solid #dce8e1;
            padding: 20px 30px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-content {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #315c4b;
        }

        nav {
            display: flex;
            gap: 20px;
        }

        nav a {
            text-decoration: none;
            color: #52665b;
            font-weight: bold;
        }

        nav a:hover {
            color: #315c4b;
        }

        .hero {
            background-color: #e7f1eb;
            padding: 70px 25px;
            text-align: center;
        }

        .hero h1 {
            font-size: 48px;
            margin: 0 0 15px;
            color: #315c4b;
        }

        .hero p {
            font-size: 20px;
            max-width: 650px;
            margin: auto;
            line-height: 1.6;
            color: #52665b;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 45px 25px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .section-title h2 {
            font-size: 32px;
            color: #315c4b;
            margin-bottom: 10px;
        }

        .section-title p {
            color: #66756d;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
        }

        .category-card {
            background-color: white;
            border: 1px solid #dce8e1;
            border-radius: 14px;
            padding: 25px;
            text-align: center;
            transition: 0.2s;
        }

        .category-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(49, 92, 75, 0.08);
        }

        .category-card h3 {
            color: #315c4b;
            margin-top: 0;
        }

        .category-card p {
            color: #66756d;
            line-height: 1.5;
        }

        .ingredient-section {
            background-color: #ffffff;
            border: 1px solid #dce8e1;
            border-radius: 18px;
            padding: 30px;
            margin-top: 20px;
        }

        .search-box {
            width: 100%;
            padding: 15px;
            border: 1px solid #cbdad1;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 25px;
        }

        .ingredient-groups {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .ingredient-group h3 {
            color: #315c4b;
            border-bottom: 1px solid #dce8e1;
            padding-bottom: 8px;
        }
