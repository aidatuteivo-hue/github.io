<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CRAVE</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f8f8f5;
            color: #222;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 6%;
            background: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .language {
            display: flex;
            gap: 16px;
        }

        .language button {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
        }

        .language button:hover {
            text-decoration: underline;
        }

        main {
            max-width: 1200px;
            margin: auto;
            padding: 70px 6%;
        }

        .hero {
            text-align: center;
            margin-bottom: 60px;
        }

        .hero h1 {
            font-size: clamp(42px, 8vw, 80px);
            margin-bottom: 20px;
        }

        .hero p {
            color: #666;
            font-size: 18px;
            margin-bottom: 35px;
        }

        .search-box {
            display: flex;
            max-width: 700px;
            margin: auto;
            background: white;
            border-radius: 50px;
            padding: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 18px 22px;
            font-size: 16px;
            border-radius: 50px;
        }

        .search-box button {
            border: none;
            background: #6b8e23;
            color: white;
            padding: 0 28px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
        }

        .search-box button:hover {
            opacity: 0.85;
        }

        .pantry-button {
            display: block;
            margin: 25px auto 0;
            padding: 14px 24px;
            border: 1px solid #ccc;
            background: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
        }

        .pantry-button:hover {
            background: #eeeeea;
        }

        .section-title {
            text-align: center;
            margin-bottom: 25px;
        }

        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 35px;
        }

        .filter-button {
            padding: 10px 18px;
            border: 1px solid #ccc;
            background: white;
            border-radius: 30px;
            cursor: pointer;
        }

        .filter-button:hover {
            background: #eeeeea;
        }

        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
        }

        .recipe-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.06);
            transition: transform 0.2s;
        }

        .recipe-card:hover {
            transform: translateY(-5px);
        }

        .recipe-image {
            height: 190px;
            background: #e4e4dc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
        }

        .recipe-content {
            padding: 20px;
        }

        .recipe-content h3 {
            margin-bottom: 10px;
        }

        .recipe-content p {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background: #eef1e8;
            color: #5d7621;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .match {
            margin-top: 12px;
            font-weight: bold;
            font-size: 14px;
        }

        .pantry-section {
            margin-top: 80px;
            padding: 35px;
            background: white;
            border-radius: 20px;
        }

        .ingredient-category {
            margin-bottom: 25px;
        }

        .ingredient-category h3 {
            margin-bottom: 12px;
        }

        .ingredients {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .ingredient {
            padding: 10px 15px;
            border: 1px solid #ccc;
            background: white;
            border-radius: 25px;
            cursor: pointer;
        }

        .ingredient.selected {
            background: #6b8e23;
            color: white;
        }

        .reset-button {
            margin-top: 25px;
            padding: 12px 20px;
            border: none;
            background: #222;
            color: white;
            border-radius: 25px;
            cursor: pointer;
        }

        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            color: #666;
            padding: 40px;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #777;
        }

        @media (max-width: 600px) {

            .search-box {
                flex-direction: column;
                border-radius: 20px;
            }

            .search-box button {
                padding: 15px;
            }

            .pantry-section {
                padding: 25px;
            }

        }

    </style>
</head>

<body>

<header>

    <div class="logo">
        CRAVE
    </div>

    <div class="language">
        <button onclick="setLanguage('en')">
            ENG
        </button>

        <button onclick="setLanguage('lt')">
            LT
        </button>
    </div>

</header>


<main>

    <section class="hero">

        <h1 id="mainTitle">
            What are you looking for?
        </h1>

        <p id="mainDescription">
            Search recipes, ingredients, meal ideas, and more.
        </p>

        <div class="search-box">

            <input
                type="text"
                id="searchInput"
                placeholder="Search recipes, ingredients, or tags..."
            >

            <button onclick="searchRecipes()">
                Search
            </button>

        </div>

        <button
            class="pantry-button"
            onclick="scrollToPantry()">

            🧺 Choose ingredients you have

        </button>

    </section>


    <section id="recipesSection">

        <h2 class="section-title">
            Recipes
        </h2>


        <div class="filters">

            <button
                class="filter-button"
                onclick="filterRecipes('all')">

                All

            </button>

            <button
                class="filter-button"
                onclick="filterRecipes('quick')">

                Quick

            </button>

            <button
                class="filter-button"
                onclick="filterRecipes('healthy')">

                Healthy

            </button>

            <button
                class="filter-button"
                onclick="filterRecipes('vegetarian')">

                Vegetarian

            </button>

            <button
                class="filter-button"
                onclick="filterRecipes('high protein')">

                High Protein

            </button>

        </div>


        <div
            class="recipes-grid"
            id="recipesGrid">

        </div>

    </section>


    <section
        class="pantry-section"
        id="pantrySection">

        <h2>
            🧺 Pantry Ingredients
        </h2>

        <p style="margin: 12px 0 25px; color: #666;">
            Select the ingredients you have and CRAVE will show the best matches.
        </p>


        <div class="ingredient-category">

            <h3>
                🥦 Vegetables
            </h3>

            <div class="ingredients">

                <button
                    class="ingredient"
                    onclick="toggleIngredient(this, 'tomato')">

                    Tomato

                </button>

                <button
                    class="ingredient"
                    onclick="toggleIngredient(this, 'broccoli')">

                    Broccoli

                </button>

                <button
                    class="ingredient"
                    onclick="toggleIngredient(this, 'potato')">

                    Potato

                </button>

            </div>

        </div>


        <div class="ingredient-category">

            <h3>
                🍗 Meat
            </h3>

            <div class="ingredients">

                <button
                    class="ingredient"
                    onclick="toggleIngredient(this, 'chicken')">

                    Chicken

                </button>

                <button
                    class="ingredient"
                    onclick="toggleIngredient(this, 'beef')">

                    Beef

                </button>

            </div>

        </div>


        <div class="ingredient-category">

            <h3>
                🍚 Grains & Basics
            </h3>

            <div class="ingredients">

                <button
                    class="ingredient"
                    onclick="toggleIngredient(this, 'rice')">

                    Rice

                </button>

                <button
                    class="ingredient"
                    onclick="toggleIngredient(this, 'pasta')">

                    Pasta

                </button>

                <button
                    class="ingredient"
                    onclick="toggleIngredient(this, 'garlic')">

                    Garlic

                </button>

            </div>

        </div>


        <button
            class="reset-button"
            onclick="resetPantry()">

            Reset Pantry

        </button>

    </section>

</main>


<footer>

    © 2026 CRAVE

</footer>


<script>


    /*
    ===============================
    RECIPE DATA
    ===============================
    */


    const recipes = [

        {
            name: "Example Pasta",

            description:
                "A simple and delicious pasta meal.",

            tags: [
                "Quick",
                "Dinner"
            ],

            ingredients: [
                "pasta",
                "garlic",
                "tomato"
            ]

        },


        {
            name: "Healthy Chicken Rice Bowl",

            description:
                "A balanced meal with chicken, rice, and vegetables.",

            tags: [
                "Healthy",
                "High Protein",
                "Lunch"
            ],

            ingredients: [
                "chicken",
                "rice",
                "broccoli"
            ]

        },


        {
            name: "Vegetarian Tomato Pasta",

            description:
                "A simple vegetarian pasta dish.",

            tags: [
                "Vegetarian",
                "Quick"
            ],

            ingredients: [
                "pasta",
                "tomato",
                "garlic"
            ]

        }

    ];


    let selectedIngredients = [];


    /*
    ===============================
    DISPLAY RECIPES
    ===============================
    */


    function displayRecipes(recipeList) {

        const recipesGrid =
            document.getElementById("recipesGrid");


        recipesGrid.innerHTML = "";


        if (recipeList.length === 0) {

            recipesGrid.innerHTML = `

                <div class="no-results">

                    No recipes found.

                </div>

            `;

            return;

        }


        recipeList.forEach(recipe => {

            const card =
                document.createElement("article");


            card.className =
                "recipe-card";


            card.innerHTML = `

                <div class="recipe-image">

                    Recipe Image

                </div>


                <div class="recipe-content">

                    <h3>
                        ${recipe.name}
                    </h3>


                    <p>
                        ${recipe.description}
                    </p>


                    <div class="tags">

                        ${recipe.tags.map(tag => `

                            <span class="tag">
                                ${tag}
                            </span>

                        `).join("")}

                    </div>

                </div>

            `;


            recipesGrid.appendChild(card);

        });

    }


    /*
    ===============================
    SEARCH
    ===============================
    */


    function searchRecipes() {

        const search =
            document
            .getElementById("searchInput")
            .value
            .toLowerCase()
            .trim();


        if (search === "") {

            displayRecipes(recipes);

            return;

        }


        const results =
            recipes.filter(recipe => {


                const searchableText = `

                    ${recipe.name}

                    ${recipe.description}

                    ${recipe.tags.join(" ")}

                    ${recipe.ingredients.join(" ")}

                `.toLowerCase();


                return searchableText.includes(search);

            });


        displayRecipes(results);


        document
            .getElementById("recipesSection")
            .scrollIntoView({

                behavior: "smooth"

            });

    }


    /*
    ===============================
    SEARCH WITH ENTER
    ===============================
    */


    document
        .getElementById("searchInput")
        .addEventListener(
            "keydown",
            function(event) {

                if (event.key === "Enter") {

                    searchRecipes();

                }

            }
        );


    /*
    ===============================
    FILTERS
    ===============================
    */


    function filterRecipes(filter) {


        if (filter === "all") {

            displayRecipes(recipes);

            return;

        }


        const results =
            recipes.filter(recipe => {


                return recipe.tags
                    .map(tag => tag.toLowerCase())
                    .includes(filter);

            });


        displayRecipes(results);

    }


    /*
    ===============================
    PANTRY INGREDIENTS
    ===============================
    */


    function toggleIngredient(button, ingredient) {


        button.classList.toggle("selected");


        if (
            selectedIngredients
            .includes(ingredient)
        ) {


            selectedIngredients =
                selectedIngredients.filter(
                    item => item !== ingredient
                );


        } else {


            selectedIngredients.push(
                ingredient
            );

        }


        matchPantryRecipes();

    }


    /*
    ===============================
    PANTRY MATCHING
    ===============================
    */


    function matchPantryRecipes() {


        if (
            selectedIngredients.length === 0
        ) {

            displayRecipes(recipes);

            return;

        }


        const rankedRecipes =
            recipes.map(recipe => {


                const matches =
                    recipe.ingredients.filter(
                        ingredient =>
                            selectedIngredients
                            .includes(ingredient)
                    );


                const percentage =
                    Math.round(
                        (
                            matches.length /
                            recipe.ingredients.length
                        ) * 100
                    );


                return {

                    recipe: recipe,

                    percentage: percentage

                };

            });


        rankedRecipes.sort(
            (a, b) =>
                b.percentage -
                a.percentage
        );


        const recipesGrid =
            document
            .getElementById("recipesGrid");


        recipesGrid.innerHTML = "";


        rankedRecipes.forEach(item => {


            const card =
                document
                .createElement("article");


            card.className =
                "recipe-card";


            card.innerHTML = `

                <div class="recipe-image">

                    Recipe Image

                </div>


                <div class="recipe-content">

                    <h3>

                        ${item.recipe.name}

                    </h3>


                    <p>

                        ${item.recipe.description}

                    </p>


                    <div class="tags">

                        ${item.recipe.tags.map(tag => `

                            <span class="tag">

                                ${tag}

                            </span>

                        `).join("")}

                    </div>


                    <div class="match">

                        ${item.percentage}% ingredient match

                    </div>

                </div>

            `;


            recipesGrid.appendChild(card);

        });


        document
            .getElementById("recipesSection")
            .scrollIntoView({

                behavior: "smooth"

            });

    }


    /*
    ===============================
    RESET PANTRY
    ===============================
    */


    function resetPantry() {


        selectedIngredients = [];


        document
            .querySelectorAll(".ingredient")
            .forEach(button => {

                button.classList
                    .remove("selected");

            });


        displayRecipes(recipes);

    }


    /*
    ===============================
    SCROLL TO PANTRY
    ===============================
    */


    function scrollToPantry() {


        document
            .getElementById("pantrySection")
            .scrollIntoView({

                behavior: "smooth"

            });

    }


    /*
    ===============================
    LANGUAGE SWITCHER
    ===============================
    */


    function setLanguage(language) {


        if (language === "lt") {


            document
                .getElementById("mainTitle")
                .textContent =
                "Ko ieškote?";


            document
                .getElementById("mainDescription")
                .textContent =
                "Ieškokite receptų, ingredientų, patiekalų idėjų ir dar daugiau.";


            document
                .getElementById("searchInput")
                .placeholder =
                "Ieškokite receptų, ingredientų arba žymų...";


        } else {


            document
                .getElementById("mainTitle")
                .textContent =
                "What are you looking for?";


            document
                .getElementById("mainDescription")
                .textContent =
                "Search recipes, ingredients, meal ideas, and more.";


            document
                .getElementById("searchInput")
                .placeholder =
                "Search recipes, ingredients, or tags...";

        }

    }


    /*
    ===============================
    INITIAL LOAD
    ===============================
    */


    displayRecipes(recipes);


</script>

</body>

</html>
