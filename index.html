<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CRAVE</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f8f8f5;
            color: #222;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 6%;
            background: white;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .language {
            display: flex;
            gap: 15px;
            font-size: 14px;
        }

        .language button {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 14px;
        }

        .language button:hover {
            text-decoration: underline;
        }

        main {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: clamp(40px, 7vw, 80px);
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 20px;
            margin-bottom: 35px;
            color: #666;
        }

        .search-box {
            display: flex;
            width: min(700px, 100%);
            background: white;
            border-radius: 50px;
            padding: 8px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .search-box input {
            flex: 1;
            border: none;
            outline: none;
            padding: 18px 22px;
            font-size: 16px;
            border-radius: 50px;
        }

        .search-box button {
            border: none;
            background: #6b8e23;
            color: white;
            padding: 0 28px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 16px;
        }

        .search-box button:hover {
            opacity: 0.85;
        }

        .pantry-button {
            margin-top: 25px;
            padding: 14px 24px;
            border-radius: 30px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            font-size: 15px;
        }

        .pantry-button:hover {
            background: #f0f0ec;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">CRAVE</div>

        <div class="language">
            <button onclick="setLanguage('en')">ENG</button>
            <button onclick="setLanguage('lt')">LT</button>
        </div>
    </header>

    <main>
        <h1 id="title">What are you looking for?</h1>

        <p class="subtitle" id="subtitle">
            Search recipes, ingredients, meal ideas, and more.
        </p>

        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="Search recipes, ingredients, or tags..."
            >

            <button onclick="searchRecipes()">
                Search
            </button>
        </div>

        <button class="pantry-button" onclick="openPantry()">
            🧺 Choose ingredients from your pantry
        </button>
    </main>

    <footer>
        © 2026 CRAVE
    </footer>

    <script>
        function searchRecipes() {
            const search = document.getElementById("searchInput").value;

            if (search.trim() === "") {
                alert("Please enter something to search for.");
                return;
            }

            alert("Searching for: " + search);
        }

        function openPantry() {
            alert("The pantry ingredient selector will be built next!");
        }

        function setLanguage(language) {
            const title = document.getElementById("title");
            const subtitle = document.getElementById("subtitle");
            const searchInput = document.getElementById("searchInput");
            const pantryButton = document.querySelector(".pantry-button");

            if (language === "lt") {
                title.textContent = "Ko ieškote?";
                subtitle.textContent = "Ieškokite receptų, ingredientų, patiekalų idėjų ir dar daugiau.";
                searchInput.placeholder = "Ieškokite receptų, ingredientų arba žymų...";
                pantryButton.textContent = "🧺 Pasirinkite ingredientus iš savo spintelės";
            } else {
                title.textContent = "What are you looking for?";
                subtitle.textContent = "Search recipes, ingredients, meal ideas, and more.";
                searchInput.placeholder = "Search recipes, ingredients, or tags...";
                pantryButton.textContent = "🧺 Choose ingredients from your pantry";
            }
        }
    </script>

</body>
</html>
